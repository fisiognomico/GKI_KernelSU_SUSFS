name: Build AVD Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options: [ Actions, Pre-Release, Release ]
        default: Actions
      ksu_commit:
        description: "KSU Commit (optional)"
        type: string
        default: ""
        required: false

jobs:
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.fetch.outputs.ksu_commit }}
      patches_commit: ${{ steps.fetch.outputs.patches_commit }}
      susfs_commit: ${{ steps.fetch.outputs.susfs_commit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Fetch Commits
        id: fetch
        uses: ./.github/actions/fetch-commits
        with:
          ksu_commit: ${{ inputs.ksu_commit }}

  build-avd:
    needs: fetch-commits
    uses: ./.github/workflows/avd-build.yml
    with:
      kernel_version: "6.1.157-android14-2025-12"
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: "WKSU+SUSFS"
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions' }}
    permissions:
      contents: write
    needs:
    - build-avd

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_NAME: "AVD Kernel With WKSU & SUSFS"
      RELEASE_BODY: ""
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
    - name: Validate Selected Builds
      run: |
        set -euo pipefail
        if [[ "${{ needs.build-avd.result }}" != "success" ]]; then
          echo "Required job build-avd did not succeed (result: ${{ needs.build-avd.result }})"
          exit 1
        fi

    - name: Free Disk Space
      if: true
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"
        testing: false

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate New Tag
      id: tag
      run: |
        LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
        if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
          LATEST_TAG="v0.0.0"
        fi

        if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          REV="${BASH_REMATCH[2]}"
          NEW_REV=$((REV + 1))
          NEW_TAG="${VERSION}-r${NEW_REV}"
        else
          NEW_TAG="${LATEST_TAG}-r1"
        fi

        echo "Latest tag: $LATEST_TAG"
        echo "New tag: $NEW_TAG"
        echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Set release body
      run: |
        cat << 'EOF' > release_body.md

        **IMPORTANT DISCLAIMER**
        This software is provided for testing and educational purposes only. Use at your own risk.
        The developers are not responsible for any damage, data loss, or issues that may occur.
        Please ensure you have proper backups before installation.

        Features:
        -> Wild KSU Manager Support, Also Compatible with KernelSU-Next Manager
        -> SUSFS ඞ v2.0.0
        -> SUSFS Inline Hooks
        -> IPSet Support for Advanced Network Filtering
        -> BBRv1 TCP Congestion Control

        Kernel Flasher:
        -> https://github.com/fatalcoder524/KernelFlasher/

        Manager:
        -> Wild KSU Manager: https://github.com/WildKernels/Wild_KSU
        -> Next: https://github.com/KernelSU-Next/KernelSU-Next

        Module:
        -> https://github.com/sidex15/ksu_module_susfs

        AVD Usage:
        -> cvd create -kernel_path=./Image -initramfs_path=./initramfs.img
        EOF

    - name: Download AVD Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./downloaded-artifacts
        pattern: '*-AVD'
        merge-multiple: false

    - name: Package release assets
      run: |
        mkdir -p release-assets
        for dir in ./downloaded-artifacts/*-AVD; do
          [ -d "$dir" ] || continue
          name=$(basename "$dir")
          # Create individual zip for each artifact directory
          (cd "$dir" && zip -r -q -9 "../../release-assets/${name}.zip" .)
          # Also copy individual files
          cp "$dir/"* "./release-assets/" 2>/dev/null || true
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: "${{ steps.tag.outputs.new_tag }}-AVD"
        body_path: release_body.md
        draft: false
        prerelease: ${{ inputs.release_type == 'Pre-Release' }}
        files: release-assets/*
